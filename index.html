<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>📚 المكتبة</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #1e3c72;
    color: white;
}

input, button {
    padding: 10px;
    margin: 5px;
}

.book {
    background: white;
    color: black;
    margin: 10px auto;
    padding: 15px;
    width: 320px;
    border-radius: 10px;
}

button.delete {
    background: red;
    color: white;
    border: none;
    padding: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>📚 المكتبة</h1>

<button onclick="login()">🔐 دخول الأدمن</button>

<div id="adminPanel" style="display:none;">
    <h3>رفع كتاب</h3>
    <input id="name" placeholder="اسم الكتاب"><br>
    <input type="file" id="file"><br>
    <button onclick="upload()">📤 رفع</button>
</div>

<hr>

<div id="books"></div>

<script>
const API = "http://localhost:3000";
let adminPassword = null;

// 🔐 LOGIN
function login() {
    const pass = prompt("كلمة المرور:");

    if (pass === "1234") {
        adminPassword = pass;
        document.getElementById("adminPanel").style.display = "block";
        alert("تم الدخول كأدمن ✅");
        loadBooks();
    } else {
        alert("خطأ ❌");
    }
}

// 📤 UPLOAD
async function upload() {
    const name = document.getElementById("name").value;
    const file = document.getElementById("file").files[0];

    const form = new FormData();
    form.append("name", name);
    form.append("file", file);
    form.append("password", adminPassword);

    const res = await fetch(API + "/upload", {
        method: "POST",
        body: form
    });

    const data = await res.json();

    if (data.error) {
        alert(data.error);
        return;
    }

    document.getElementById("name").value = "";
    document.getElementById("file").value = "";

    loadBooks();
    alert("تم الرفع ✅");
}

// 📚 LOAD BOOKS
async function loadBooks() {
    const res = await fetch(API + "/books");
    const data = await res.json();

    const div = document.getElementById("books");
    div.innerHTML = "";

    data.forEach(book => {
        div.innerHTML += `
            <div class="book">
                <p>${book.name}</p>
                <a href="${API + book.url}" target="_blank">📥 تحميل</a>

                ${adminPassword ? `
                    <br>
                    <button class="delete" onclick="deleteBook(${book.id})">🗑 حذف</button>
                ` : ""}
            </div>
        `;
    });
}

// 🗑 DELETE BOOK
async function deleteBook(id) {
    const res = await fetch(API + "/delete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            id: id,
            password: adminPassword
        })
    });

    const data = await res.json();

    if (data.error) {
        alert(data.error);
        return;
    }

    alert("تم الحذف 🗑");
    loadBooks();
}

loadBooks();
</script>

</body>
</html>
